
<html>

<body>
    <h2>Enter Your Name</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="name" placeholder="Enter name">
        <button type="submit">Submit</button>
    </form>

    {% if name %}
        <h3>Hello {{ name }}</h3>
    {% endif %}
</body>
</html>
